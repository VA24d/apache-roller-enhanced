# =============================================================================
# Roller custom properties — overrides roller.properties defaults
# =============================================================================
# This file is loaded from the classpath at startup and takes precedence over
# the built-in roller.properties.  Edit the values below to match your
# environment.  Never commit real credentials to version control.

# -----------------------------------------------------------------------------
# Email / SMTP configuration
# Switch from JNDI (Tomcat-managed) to plain SMTP properties so that email
# works in a local dev environment without any Tomcat JNDI setup.
# -----------------------------------------------------------------------------

mail.configurationType=properties

# --- Option A: Gmail (recommended for quick testing) -------------------------
# 1. Enable 2-Step Verification on your Google account.
# 2. Go to https://myaccount.google.com/apppasswords and generate an App
#    Password for "Mail" / "Other (custom name)".
# 3. Fill in your Gmail address and the generated App Password below.
#    Do NOT use your regular Gmail password.
# mail.hostname=smtp.gmail.com
# mail.port=587
# mail.username=your-gmail-address@gmail.com
# mail.password=your-gmail-app-password

# --- Option B: MailerSend SMTP relay (mentioned in the project spec) ---------
# 1. Sign up at https://www.mailersend.com (free tier: 3 000 emails/month).
# 2. Go to Email -> Domains, verify a domain (or use the trial domain).
# 3. Go to Email -> SMTP -> Generate Credentials.
# 4. Replace the three lines below and comment out the Gmail lines above.
mail.hostname=smtp.mailersend.net
mail.port=587
mail.username=MS_MWeEFI@test-eqvygm0w35zl0p7w.mlsender.net
mail.password=mssp.iPRY2oo.neqvygm2e0540p7w.7OJJKNb

# -----------------------------------------------------------------------------
# Site admin email — REQUIRED for email to work.
# This is used as BOTH:
#   (a) the From: address on every outgoing notification email, AND
#   (b) a fallback recipient when no admin user has an email address set
#       in their Roller profile.
#
# For MailerSend trial: set this to your verified trial sender address,
# which is usually the same as mail.username above.
#
# For Gmail: set this to your Gmail address.
# -----------------------------------------------------------------------------
site.adminemail=MS_MWeEFI@test-eqvygm0w35zl0p7w.mlsender.net

